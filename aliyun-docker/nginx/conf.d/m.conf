server {
    listen 80;
    server_name m.58haha.com;  # 前端域名

    # 防止直接IP访问
    if ($host != "m.58haha.com") {
        return 444;
    }

    # 开启gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    location = /MP_verify_hYLPIqGZ6X00Rt8o.txt {
	    root /usr/share/nginx/html;
	    expires 1d;
	    add_header Cache-Control "public";
	    # 确保能正确处理 txt 文件
	    default_type text/plain;
	}

    # 前端静态资源服务
    location / {
        proxy_pass http://chinese-page-app:80/;  # 使用Docker服务名连接前端容器
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 缓冲区优化
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://chinese-page-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 长缓存时间
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 前端API代理到后端（可选，如果需要从前端直接调用API）
    location /api/ {
        proxy_pass http://chinese-api-app:8080/;  # 代理到后端服务
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}